<svg fill="none" viewBox="0 0 900 350" width="900" height="350" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        @keyframes gradientShift {
          0% { background-position: 0% 50%; }
          50% { background-position: 100% 50%; }
          100% { background-position: 0% 50%; }
        }
        @keyframes fadeInUp {
          from { opacity: 0; transform: translateY(30px); }
          to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse {
          0%, 100% { opacity: 0.4; transform: scale(1); }
          50% { opacity: 0.8; transform: scale(1.05); }
        }
        @keyframes float {
          0%, 100% { transform: translateY(0px); }
          50% { transform: translateY(-12px); }
        }
        @keyframes glow {
          0%, 100% { box-shadow: 0 0 8px rgba(88, 166, 255, 0.3); }
          50% { box-shadow: 0 0 20px rgba(139, 92, 246, 0.5); }
        }
        @keyframes slideIn {
          from { opacity: 0; transform: translateX(-20px); }
          to { opacity: 1; transform: translateX(0); }
        }
        @keyframes borderGlow {
          0%, 100% { border-color: rgba(88, 166, 255, 0.3); }
          50% { border-color: rgba(139, 92, 246, 0.6); }
        }
        .card {
          width: 100%;
          height: 350px;
          background: linear-gradient(135deg, #0d1117 0%, #161b22 30%, #1a1f2e 60%, #13111a 100%);
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          position: relative;
          overflow: hidden;
          font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        .grid {
          position: absolute;
          top: 0; left: 0; right: 0; bottom: 0;
          background-image:
            linear-gradient(rgba(88, 166, 255, 0.03) 1px, transparent 1px),
            linear-gradient(90deg, rgba(88, 166, 255, 0.03) 1px, transparent 1px);
          background-size: 40px 40px;
          z-index: 0;
        }
        .orb {
          position: absolute;
          border-radius: 50%;
          filter: blur(80px);
          z-index: 0;
        }
        .orb-1 {
          width: 250px; height: 250px;
          background: rgba(88, 166, 255, 0.1);
          top: -60px; right: -40px;
          animation: float 8s ease-in-out infinite, pulse 6s ease-in-out infinite;
        }
        .orb-2 {
          width: 200px; height: 200px;
          background: rgba(139, 92, 246, 0.08);
          bottom: -40px; left: -30px;
          animation: float 10s ease-in-out infinite 2s, pulse 8s ease-in-out infinite 1s;
        }
        .orb-3 {
          width: 150px; height: 150px;
          background: rgba(236, 72, 153, 0.05);
          top: 40%; left: 60%;
          animation: float 12s ease-in-out infinite 4s;
        }
        .name {
          font-size: 3.4em;
          font-weight: 800;
          letter-spacing: -0.02em;
          background: linear-gradient(135deg, #58a6ff, #8b5cf6, #ec4899, #f97316, #58a6ff);
          background-size: 400% 400%;
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          animation: gradientShift 6s ease infinite, fadeInUp 1s ease-out;
          position: relative;
          z-index: 1;
          margin: 0; padding: 0;
        }
        .title {
          font-size: 1.1em;
          color: #8b949e;
          margin-top: 10px;
          letter-spacing: 0.2em;
          text-transform: uppercase;
          animation: fadeInUp 1s ease-out 0.3s both;
          position: relative;
          z-index: 1;
        }
        .title span {
          color: #58a6ff;
        }
        .divider {
          width: 80px; height: 3px;
          background: linear-gradient(90deg, #58a6ff, #8b5cf6, #ec4899);
          border-radius: 2px;
          margin-top: 14px;
          animation: fadeInUp 1s ease-out 0.5s both, glow 3s ease-in-out infinite;
          position: relative;
          z-index: 1;
        }
        .stats-row {
          display: flex;
          gap: 16px;
          margin-top: 20px;
          animation: fadeInUp 1s ease-out 0.7s both;
          position: relative;
          z-index: 1;
        }
        .stat-card {
          text-align: center;
          padding: 10px 18px;
          border: 1px solid rgba(88, 166, 255, 0.15);
          border-radius: 10px;
          background: rgba(22, 27, 34, 0.6);
          backdrop-filter: blur(10px);
          animation: borderGlow 4s ease-in-out infinite;
        }
        .stat-card:nth-child(2) { animation-delay: 1s; }
        .stat-card:nth-child(3) { animation-delay: 2s; }
        .stat-card:nth-child(4) { animation-delay: 3s; }
        .stat-value {
          font-size: 1.4em;
          font-weight: 700;
          background: linear-gradient(135deg, #58a6ff, #8b5cf6);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
        }
        .stat-label {
          font-size: 0.65em;
          color: #484f58;
          text-transform: uppercase;
          letter-spacing: 0.1em;
          margin-top: 2px;
        }
      </style>
      <div class="card">
        <div class="grid"></div>
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="name">Adam Boudjemaa</div>
        <div class="title"><span>Web3</span> &amp; <span>AI</span> &nbsp;&#x2022;&nbsp; Protocol Engineer &amp; Agent Builder</div>
        <div class="divider"></div>
        <div class="stats-row">
          <div class="stat-card">
            <div class="stat-value">2,000+</div>
            <div class="stat-label">Contracts</div>
          </div>
          <div class="stat-card">
            <div class="stat-value">$20M+</div>
            <div class="stat-label">TVL Secured</div>
          </div>
          <div class="stat-card">
            <div class="stat-value">38M+</div>
            <div class="stat-label">Transactions</div>
          </div>
          <div class="stat-card">
            <div class="stat-value">3</div>
            <div class="stat-label">ERC Standards</div>
          </div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
